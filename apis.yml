description: >-
  Woebot Health is a clinical mental health company founded in 2017 by Dr. Alison Darcy that
  delivers an AI-powered, CBT-based conversational agent ("Woebot") for evidence-based
  mental health support. The company operates an enterprise (B2B) model, partnering with
  health systems, payers, employers, and providers to embed Woebot into existing care
  pathways and digital front doors. The Woebot Health Platform offers a partner API library
  for transmitting aggregated, validated patient-reported outcomes (PHQ-8/PHQ-9, engagement,
  satisfaction, topic modeling) into EMRs and value-based care workflows. The partner API
  is gated to enterprise customers — there is no public REST API, OpenAPI specification, or
  self-serve developer portal.
apis:
  - aid: woebot:partner-api
    name: Woebot Health Partner API
    description: >-
      Gated partner API library for integrating the Woebot Health Platform into a partner's
      digital front door, EMR, or care pathway. Supports transmission of aggregated data
      including patient-reported outcomes (PHQ-8, PHQ-9), engagement metrics, satisfaction
      measures, and topic modeling that identifies user concerns. Available to enterprise
      partners (health systems, payers, providers, employers) under contract — no public
      documentation or self-serve onboarding.
